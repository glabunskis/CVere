services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Build-time args: NEXT_PUBLIC_* vars get inlined into the client bundle
      # during `next build`, so they must be passed here. Values are interpolated
      # from the file given via `--env-file` (see README below).
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - '3000:3000'
    # Runtime secrets (server-only): injected into the running container, never
    # baked into the image. Everything in this file is available to server code.
    env_file:
      - .env.local
    restart: unless-stopped
